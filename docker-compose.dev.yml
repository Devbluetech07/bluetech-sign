# Desenvolvimento local com stack real Go + Flutter.
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    environment:
      APP_ENV: development
      DB_AUTO_MIGRATE: "true"
      FRONTEND_URL: http://localhost:4100
    ports:
      - "3001:3001"

  ms-documento:
    ports:
      - "4201:3000"

  ms-selfie:
    ports:
      - "4202:3000"

  ms-selfie-documento:
    ports:
      - "4203:3000"
