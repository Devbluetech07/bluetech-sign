name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install API deps
        run: npm ci
        working-directory: apps/api
      - name: Build API
        run: npm run build
        working-directory: apps/api
      - name: Install Web deps
        run: npm ci
        working-directory: apps/web
      - name: Build Web
        run: npm run build
        working-directory: apps/web
