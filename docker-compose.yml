name: bluetech-sign

services:
  postgres:
    image: postgres:16-alpine
    container_name: bts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bluetech_sign}
      POSTGRES_USER: ${POSTGRES_USER:-bluetech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-BlueTech@2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bluetech} -d ${POSTGRES_DB:-bluetech_sign}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bts-network

  redis:
    image: redis:7-alpine
    container_name: bts-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bts-network

  minio:
    image: minio/minio:latest
    container_name: bts-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-bluetech_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-BlueTech@Minio2024}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:${MINIO_CONSOLE_PORT:-29001}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - bts-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: bts-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: development
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${WEB_PORT:-5173}}
      DATABASE_URL: postgresql://${POSTGRES_USER:-bluetech}:${POSTGRES_PASSWORD:-BlueTech@2024}@postgres:5432/${POSTGRES_DB:-bluetech_sign}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./apps/api/src:/app/src:delegated
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - bts-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: bts-web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${API_PORT:-3000}}
      VITE_APP_NAME: BlueTech Sign
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web/src:/app/src:delegated
      - /app/node_modules
    depends_on:
      - api
    networks:
      - bts-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  bts-network:
    driver: bridge
    name: bluetech-sign-network
