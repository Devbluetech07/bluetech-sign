services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL (com pgvector)
  # ---------------------------------------------------------------------------
  postgres:
    image: ankane/pgvector:latest
    container_name: singproof-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: singproof
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d singproof"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MINIO STORAGE (Compatível com S3)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: singproof-minio-v2
    command: server /data --console-address ":29101" --address ":29100"
    environment:
      MINIO_ROOT_USER: local-minio-key
      MINIO_ROOT_PASSWORD: local-minio-secret
    ports:
      - "29102:29100"  # S3 API
      - "29103:29101"  # Console
      - "9112:9101"    # Métricas
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:29100/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # BACKEND GO (API REST principal)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: singproof-backend
    ports:
      - "4101:3001"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DB_URL=${DB_URL:-postgres://root:rootpassword@postgres:5432/singproof?sslmode=disable}
      - DB_AUTO_MIGRATE=${DB_AUTO_MIGRATE:-true}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:29100}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-local-minio-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-local-minio-secret}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - MINIO_BUCKET=${MINIO_BUCKET:-bluetech-sign}
      - MINIO_PROJECT_FOLDER=${MINIO_PROJECT_FOLDER:-singproof_v1}
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:4101}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4100}
      - EMAIL_FROM=${EMAIL_FROM:-SignProof <onboarding@resend.dev>}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-trocar_em_producao}
      - VALERIS_API_TOKEN=${VALERIS_API_TOKEN:-vl_6c9ba69f076f4265fae820dbb8b0ac0cf3dcffb553d69ed320fcc486ba8d5773}
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # MICROSSERVICOS GO (conversao do legado Node/TS)
  # ---------------------------------------------------------------------------
  ms-documento:
    build:
      context: ./ms-documento
      dockerfile: Dockerfile
    container_name: singproof-ms-documento
    environment:
      - PORT=3000
      - MAIN_BACKEND_URL=http://backend:3001/api/v1/valeris/captures
      - VALERIS_API_TOKEN=${VALERIS_API_TOKEN:-vl_6c9ba69f076f4265fae820dbb8b0ac0cf3dcffb553d69ed320fcc486ba8d5773}
    depends_on:
      - backend

  ms-selfie:
    build:
      context: ./ms-selfie
      dockerfile: Dockerfile
    container_name: singproof-ms-selfie
    environment:
      - PORT=3000
      - MAIN_BACKEND_URL=http://backend:3001/api/v1/valeris/captures
      - VALERIS_API_TOKEN=${VALERIS_API_TOKEN:-vl_6c9ba69f076f4265fae820dbb8b0ac0cf3dcffb553d69ed320fcc486ba8d5773}
    depends_on:
      - backend

  ms-selfie-documento:
    build:
      context: ./ms-selfie-documento
      dockerfile: Dockerfile
    container_name: singproof-ms-selfie-documento
    environment:
      - PORT=3000
      - MAIN_BACKEND_URL=http://backend:3001/api/v1/valeris/captures
      - VALERIS_API_TOKEN=${VALERIS_API_TOKEN:-vl_6c9ba69f076f4265fae820dbb8b0ac0cf3dcffb553d69ed320fcc486ba8d5773}
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # NGINX FRONTEND + PROXY
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: singproof-nginx
    ports:
      - "4100:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/build/web:/usr/share/nginx/html:ro  # Caminho da build do flutter web
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
